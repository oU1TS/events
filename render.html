<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer</title>

    <!-- Meta Tags for SEO -->
    <meta name="description" content="A premium Markdown renderer with LaTeX support for b1tranger's writings.">
    <meta name="author" content="b1tranger">

    <!-- Preload Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- CSS Libraries -->
    <!-- GitHub Markdown CSS -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown.min.css">
    <!-- KaTeX for Math -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <!-- Highlight.js for Code Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


    <link rel="stylesheet" href="css/render.css">
    <script src="render.js" defer></script>
</head>

<body>
    <header>
        <div class="header-left">
            <a href="javascript:history.back()" class="back-btn" id="breadcrumb-back" title="Go Back">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div class="file-info">
                <span class="file-name" id="display-filename">Loading...</span>
                <span class="file-path" id="display-path"></span>
            </div>
        </div>
        <div class="header-right" style="display: flex; gap: 0.5rem; align-items: center;">
            <button class="back-btn" id="download-btn" title="Download Markdown File"
                style="border: none; background: none; cursor: pointer; display: none;">
                <i class="fa-solid fa-download"></i>
            </button>
            <button class="back-btn" id="theme-toggle-btn" title="Toggle Theme" style="border: none; background: none; cursor: pointer;">
                <i id="theme-toggle-icon" class="fa-solid fa-moon"></i>
            </button>
            <div class="nav-toggle" id="toc-toggle" title="Table of Contents">
                <i class="fa-solid fa-list-ul"></i>
            </div>
            <a href="index.html" class="back-btn" title="Home">
                <i class="fa-solid fa-house"></i>
            </a>
        </div>
    </header>

    <div id="nav-overlay"></div>
    <aside id="nav-pane">
        <div class="nav-header">
            <span class="nav-title">Navigation</span>
            <div class="nav-toggle" id="close-nav" style="border: none; background: none;">
                <i class="fa-solid fa-xmark"></i>
            </div>
        </div>
        <div id="toc-list">
            <!-- Table of contents will be generated here -->
        </div>
    </aside>

    <main class="viewer-container">
        <div id="loader">
            <div class="spinner"></div>
            <p>Rendering wonderful thoughts...</p>
        </div>
        <div id="content" class="markdown-body" style="display: none;"></div>
    </main>

    <footer class="render-footer">oU1TS Community</footer>

    <!-- Floating Search Container -->
    <div id="search-container" class="search-container-hidden">
        <div class="search-bar-header">
            <div class="search-input-wrapper">
                <i class="fa-solid fa-magnifying-glass search-input-icon"></i>
                <input type="text" id="search-input" placeholder="Search document..." autocomplete="off">
                <button id="search-clear-btn" title="Clear Search" style="display: none;">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="search-arrows">
                <button id="search-prev-btn" title="Previous Match" disabled>
                    <i class="fa-solid fa-chevron-up"></i>
                </button>
                <button id="search-next-btn" title="Next Match" disabled>
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
            </div>
            <button id="search-list-btn" title="Back to List View" style="display: none;">
                <i class="fa-solid fa-list"></i>
            </button>
            <button id="search-close-btn" title="Close Search">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div id="search-tags-container" class="search-tags-container" style="display: none;">
            <div class="search-tags-title">Common terms:</div>
            <div id="search-tags-list" class="search-tags-list"></div>
        </div>
        <div id="search-results-list" class="search-results-list"></div>
    </div>

    <!-- Floating Search Button -->
    <button id="floating-search-toggle" title="Search Document" style="display: none;">
        <i class="fa-solid fa-magnifying-glass"></i>
    </button>

    <!-- Scripts -->
    <!-- Marked for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- DOMPurify for Security -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <!-- Highlight.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- KaTeX -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <!-- Mermaid for Diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>



</body>

</html>
